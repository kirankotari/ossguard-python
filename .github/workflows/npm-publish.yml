name: Publish to npm

on:
  release:
    types: [published]

permissions: read-all

jobs:
  publish-platform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pkg:
          - cli-linux-x64
          - cli-linux-arm64
          - cli-darwin-x64
          - cli-darwin-arm64
          - cli-win32-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642195f82ba3230a0e46116 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-${{ matrix.pkg }}
          path: pkg/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.release.target_commitish && '' }}

      - name: Sync version and publish
        working-directory: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    needs: publish-platform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642195f82ba3230a0e46116 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version and publish
        working-directory: npm/ossguard
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          # Update optionalDependencies versions
          node -e "
            const pkg = require('./package.json');
            for (const k of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[k] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cp ../../LICENSE .
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
