name: Build Standalone Binaries

on:
  push:
    tags: ["v*"]

permissions: read-all

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ossguard-linux-amd64
            npm_pkg: cli-linux-x64
            npm_bin: ossguard
            pyinstaller_args: ""
          - os: ubuntu-24.04-arm
            artifact: ossguard-linux-arm64
            npm_pkg: cli-linux-arm64
            npm_bin: ossguard
            pyinstaller_args: ""
          - os: macos-13
            artifact: ossguard-macos-x64
            npm_pkg: cli-darwin-x64
            npm_bin: ossguard
            pyinstaller_args: ""
          - os: macos-latest
            artifact: ossguard-macos-arm64
            npm_pkg: cli-darwin-arm64
            npm_bin: ossguard
            pyinstaller_args: ""
          - os: windows-latest
            artifact: ossguard-windows-amd64.exe
            npm_pkg: cli-win32-x64
            npm_bin: ossguard.exe
            pyinstaller_args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller==6.13.0

      - name: Build binary
        run: |
          pyinstaller --onefile --name ossguard --clean \
            --hidden-import ossguard.analyzers \
            --hidden-import ossguard.generators \
            --hidden-import ossguard.parsers \
            --hidden-import ossguard.apis \
            --collect-submodules ossguard \
            src/ossguard/cli.py
        shell: bash

      - name: Rename artifact
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/ossguard.exe "dist/${{ matrix.artifact }}"
          else
            mv dist/ossguard "dist/${{ matrix.artifact }}"
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Prepare npm platform package
        run: |
          mkdir -p npm-pkg/bin
          cp "dist/${{ matrix.artifact }}" "npm-pkg/bin/${{ matrix.npm_bin }}"
          cp "npm/@ossguard/${{ matrix.npm_pkg }}/package.json" npm-pkg/package.json
        shell: bash

      - name: Upload npm package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-${{ matrix.npm_pkg }}
          path: npm-pkg/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: Generate checksums
        run: |
          mkdir -p release
          for dir in ossguard-*; do
            cp "$dir"/* release/ 2>/dev/null || true
          done
          cd release
          sha256sum * > checksums-sha256.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: release/*
          fail_on_unmatched_files: false
